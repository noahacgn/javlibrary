name: Daily JAVLibrary ranking check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'
      timezone: 'Asia/Shanghai'

permissions:
  contents: write

jobs:
  check-ranking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Check ranking
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_SMTP_AUTH_CODE: ${{ secrets.QQ_SMTP_AUTH_CODE }}
        run: python scripts/check_ranking.py

      - name: Commit ranking state
        run: |
          if [ -z "$(git status --porcelain -- data/latest.json)" ]; then
            echo "No ranking state changes."
            exit 0
          fi

          was_tracked=false
          if git ls-files --error-unmatch data/latest.json >/dev/null 2>&1; then
            was_tracked=true
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json

          if git diff --cached --quiet --exit-code; then
            echo "No staged ranking state changes."
            exit 0
          fi

          if [ "$was_tracked" = "true" ]; then
            git commit -m "chore(data): 更新演员排行榜状态"
          else
            git commit -m "chore(data): 初始化演员排行榜基线"
          fi
          git push
